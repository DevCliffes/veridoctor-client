# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # JS/TS dependencies across the pnpm workspace (apps/* and packages/*).
  # Dependabot's "npm" ecosystem type auto-detects pnpm-lock.yaml, so this
  # single root-level entry covers the whole monorepo -- no need for a
  # separate entry per app or package.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Bundles all patch/minor bumps into a single weekly PR instead of
      # one PR per package -- cuts ~15 separate PRs (and their preview
      # builds) down to 1-2 PRs to review.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Next.js's next.config.ts loader depends on TypeScript's old JS
      # Compiler API, which TypeScript 7's Go-based rewrite dropped.
      # Block major bumps so Dependabot can't repeat the 5.9 -> 7.0 jump
      # that broke the build; patch/minor 5.x bumps are still allowed.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
  # GitHub Actions workflow versions (e.g. actions/checkout, actions/setup-node),
  # if/when this repo adds any under .github/workflows/. Harmless to include
  # now even if that folder is empty -- Dependabot just finds nothing to update.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # Same idea for Actions -- bundle version bumps into one PR.
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
